<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fibonacci & Faktorial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="container-fluid p-0">
        <!--NavBar-->
        <nav class="navbar navbar-expand-lg navbar-light bg-info">
            <div class="container-fluid">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav mx-auto justify-content-center w-100">
                        <li class="nav-item">
                            <a class="nav-link text-dark fs-5" href="/">Artimatika</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark fs-5" href="/logika.html">Logika</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark fs-5" href="/mata_uang.html">Mata uang</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark fs-5" href="/suhu.html">Suhu</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active fw-bold text-dark fs-5" aria-current="page"
                                href="/fakbonaci.html">Fibonaci Faktorial</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <!--end navbar-->

        <!--Fibonacci & Faktorial-->
        <div class="container p-4">
            <div class="card-shadow p-4" style="height: auto; min-height: 60vh;">
                <p class="text-center fs-5 fw-bold">Fibonaci & Faktorial</p>

                <!-- Layar Input -->
                <input type="text" id="display" class="form-control screen mb-3" value="0" readonly>

                <!-- Tombol Pilih Mode -->
                <div class="row g-3 mb-3">
                    <div class="col-6">
                        <button class="btn btn-light calc-btn rounded-pill w-100 btn-unit aktif" id="btn-FIB"
                            onclick="setMode('fibonacci')">FIBONACCI</button>
                    </div>
                    <div class="col-6">
                        <button class="btn btn-light calc-btn rounded-pill w-100 btn-unit" id="btn-FACT"
                            onclick="setMode('faktorial')">FAKTORIAL</button>
                    </div>
                </div>

                <!-- Keypad angka -->
                <div class="container-fluid p-0">
                    <div class="row g-3 mb-3">
                        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
                                onclick="appendInput('7')">7</button></div>
                        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
                                onclick="appendInput('8')">8</button></div>
                        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
                                onclick="appendInput('9')">9</button></div>
                        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
                                onclick="backspace()">⌫</button></div>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
                                onclick="appendInput('4')">4</button></div>
                        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
                                onclick="appendInput('5')">5</button></div>
                        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
                                onclick="appendInput('6')">6</button></div>
                        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
                                onclick="clearScreen()">AC</button></div>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
                                onclick="appendInput('1')">1</button></div>
                        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
                                onclick="appendInput('2')">2</button></div>
                        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
                                onclick="appendInput('3')">3</button></div>
                        <div class="col-3 d-flex align-items-center justify-content-center text-muted" id="modeLabel"
                            style="font-size:0.75rem; font-weight:bold;">FIB</div>
                    </div>
                    <div class="row g-3">
                        <div class="col-6"><button class="btn btn-light calc-btn rounded-pill w-100"
                                onclick="appendInput('0')">0</button></div>
                        <div class="col-6"><button class="btn btn-primary calc-btn rounded-pill w-100"
                                onclick="hitung()">=</button></div>
                    </div>
                </div>

                <!-- Hasil -->
                <div id="hasilBox" class="hasil-box d-none mt-3">
                    <div id="hasilTeks"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        let modeSaat = 'fibonacci';

        function setMode(mode) {
            modeSaat = mode;
            document.querySelectorAll('.btn-unit').forEach(b => b.classList.remove('aktif'));
            document.getElementById(mode === 'fibonacci' ? 'btn-FIB' : 'btn-FACT').classList.add('aktif');
            document.getElementById('modeLabel').textContent = mode === 'fibonacci' ? 'FIB' : 'FACT';
            clearScreen();
        }

        function appendInput(val) {
            if (display.value === '0') {
                display.value = val;
            } else {
                if (display.value.length < 3) display.value += val;
            }
        }

        function clearScreen() {
            display.value = '0';
            document.getElementById('hasilBox').classList.add('d-none');
        }

        function backspace() {
            display.value = display.value.length > 1 ? display.value.slice(0, -1) : '0';
        }

        function hitung() {
            const n = parseInt(display.value) || 0;

            fetch('/api/kalkulator', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mode: modeSaat, n: n })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.error) { display.value = data.error; return; }

                    document.getElementById('hasilBox').classList.remove('d-none');

                    if (modeSaat === 'fibonacci') {
                        display.value = data.fibonacci_ke_n;
                        document.getElementById('hasilTeks').innerHTML =
                            `<strong>Fibonacci ke-${data.n}:</strong> <span class="text-primary">${data.fibonacci_ke_n}</span><br>
                         <strong>Deret (0 s/d ${data.n}):</strong><br>
                         <span>${data.deret.join(' → ')}</span>`;
                    } else {
                        display.value = data.hasil;
                        document.getElementById('hasilTeks').innerHTML =
                            `<strong>Faktorial:</strong><br>
                         <span class="text-primary">${data.notasi}</span>`;
                    }
                })
                .catch(() => { display.value = 'Error'; });
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
