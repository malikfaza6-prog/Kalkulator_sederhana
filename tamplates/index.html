<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
  <header class="container-fluid p-0">
    <!--NavBar-->
    <nav class="navbar navbar-expand-lg navbar-light bg-info">
      <div class="container-fluid">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
          aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav mx-auto justify-content-center w-100">
            <li class="nav-item">
              <a class="nav-link active fw-bold text-dark fs-5" aria-current="page" href="index.html">Artimatika</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-dark fs-5" href="logika.html">Logika</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-dark fs-5" href="mata_uang.html">Mata uang</a>

            <li class="nav-item">
              <a class="nav-link text-dark fs-5" href="suhu.html">Suhu</a>
            </li>

            </li>
          </ul>
        </div>

      </div>
    </nav>
  </header>
  <!--end navbar-->
  <!--calculator-->
  <div class="container p-4 d-flex justify-content-center">
    <div class="card-shadow p-4">
      <p class="text-center fs-5 fw-bold">Kalkulator Artimatika</p>
      <input type="text" id="display" class="form-control screen mb-4" value="0" readonly>
      <div class="container-fluid p-0">
        <div class="row g-3 mb-3">
          <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
              onclick="appendInput('sin')">SIN</button></div>
          <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
              onclick="appendInput('cos')">COS</button></div>
          <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
              onclick="appendInput('%')">%</button></div>
          <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
              onclick="appendInput('-')">-</button></div>
        </div>

        <!-- Baris 2 -->
        <div class="row g-3 mb-3">
          <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
              onclick="appendInput('7')">7</button></div>
          <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
              onclick="appendInput('8')">8</button></div>
          <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
              onclick="appendInput('9')">9</button></div>
          <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
              onclick="appendInput('+')">+</button></div>
        </div>

        <!-- Baris 3 -->
        <div class="row g-3 mb-3">
          <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
              onclick="appendInput('4')">4</button></div>
          <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
              onclick="appendInput('5')">5</button></div>
          <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
              onclick="appendInput('6')">6</button></div>
          <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
              onclick="appendInput('/')">/</button></div>
        </div>

        <!-- Baris 4 -->
        <div class="row g-3 mb-3">
          <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
              onclick="appendInput('1')">1</button></div>
          <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
              onclick="appendInput('2')">2</button></div>
          <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
              onclick="appendInput('3')">3</button></div>
          <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
              onclick="appendInput('*')">*</button></div>
        </div>

        <!-- Baris 5 -->
        <div class="row g-3">
          <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
              onclick="appendInput('0')">0</button></div>
          <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100" onclick="backspace()">⌫</button>
          </div>
          <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
              onclick="clearScreen()">AC</button></div>
          <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100" onclick="calculate()">=</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  </div>

  </div>
  <!-- JAVASCRIPT UNTUK LOGIKA TOMBOL & PANEL -->
  <script>
    const display = document.getElementById('display');

    // Fungsi untuk memasukkan angka/simbol ke layar panel saat tombol diklik
    function appendInput(val) {
      if (display.value === '0') {
        display.value = val;
      } else {
        display.value += val;
      }
    }

    // Fungsi tombol AC (Clear) untuk mengembalikan layar ke angka 0
    function clearScreen() {
      display.value = '0';
    }

    // Fungsi tombol Backspace (Hapus satu per satu karakter dari kanan)
    function backspace() {
      if (display.value.length > 1) {
        display.value = display.value.slice(0, -1);
      } else {
        display.value = '0';
      }
    }

    // Fungsi tombol (=) untuk menghitung total maematika matematika
    function calculate() {
      try {
        let expression = display.value;

        // Logika tambahan jika ada fungsi SIN atau COS matematika
        expression = expression.replace(/sin/g, "Math.sin");
        expression = expression.replace(/cos/g, "Math.cos");

        // eval() bertugas mengeksekusi string teks menjadi hitungan matematika asli
        display.value = eval(expression);
      } catch (err) {
        display.value = 'Error';
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
