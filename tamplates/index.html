<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kalkulator Sederhana</title>
  <!-- Bootstrap 5.3 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-info">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Aplikasi Konversi & Kalkulator</a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="/suhu">Konversi Suhu</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/mata_uang">Konversi Mata Uang</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/fibonacci">Deret Fibonacci</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/faktorial">Kalkulator Faktorial</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/kalkulator">Kalkulator Ilmiah</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <!-- Wadah Utama Kalkulator -->
  <div class="calculator-box">

    <!-- PANEL LAYAR (Menggunakan Input HTML) -->
    <!-- id="display" inilah yang nanti diisi oleh JavaScript -->
    <input type="text" id="display" class="form-control screen mb-4" value="0" readonly>

    <!-- TOMBOL-TOMBOL (Menggunakan Grid Bootstrap) -->
    <div class="container-fluid p-0">

      <!-- Baris 1 -->
      <div class="row g-3 mb-3">
        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
            onclick="appendInput('sin')">SIN</button></div>
        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
            onclick="appendInput('cos')">COS</button></div>
        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
            onclick="appendInput('%')">%</button></div>
        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
            onclick="appendInput('-')">-</button></div>
      </div>

      <!-- Baris 2 -->
      <div class="row g-3 mb-3">
        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
            onclick="appendInput('7')">7</button></div>
        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
            onclick="appendInput('8')">8</button></div>
        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
            onclick="appendInput('9')">9</button></div>
        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
            onclick="appendInput('+')">+</button></div>
      </div>

      <!-- Baris 3 -->
      <div class="row g-3 mb-3">
        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
            onclick="appendInput('4')">4</button></div>
        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
            onclick="appendInput('5')">5</button></div>
        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
            onclick="appendInput('6')">6</button></div>
        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
            onclick="appendInput('/')">/</button></div>
      </div>

      <!-- Baris 4 -->
      <div class="row g-3 mb-3">
        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
            onclick="appendInput('1')">1</button></div>
        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
            onclick="appendInput('2')">2</button></div>
        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
            onclick="appendInput('3')">3</button></div>
        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
            onclick="appendInput('*')">*</button></div>
      </div>

      <!-- Baris 5 -->
      <div class="row g-3">
        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
            onclick="appendInput('0')">0</button></div>
        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100" onclick="backspace()">⌫</button>
        </div>
        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100" onclick="clearScreen()">AC</button>
        </div>
        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100" onclick="calculate()">=</button>
        </div>
      </div>

    </div>
  </div>

  <!-- JAVASCRIPT UNTUK LOGIKA TOMBOL & PANEL -->
  <script>
    const display = document.getElementById('display');

    // Fungsi untuk memasukkan angka/simbol ke layar panel saat tombol diklik
    function appendInput(val) {
      if (display.value === '0') {
        display.value = val;
      } else {
        display.value += val;
      }
    }

    // Fungsi tombol AC (Clear) untuk mengembalikan layar ke angka 0
    function clearScreen() {
      display.value = '0';
    }

    // Fungsi tombol Backspace (Hapus satu per satu karakter dari kanan)
    function backspace() {
      if (display.value.length > 1) {
        display.value = display.value.slice(0, -1);
      } else {
        display.value = '0';
      }
    }

    // Fungsi tombol (=) untuk menghitung total matematika matematika
    function calculate() {
      try {
        let expression = display.value;

        // Logika tambahan jika ada fungsi SIN atau COS matematika
        expression = expression.replace(/sin/g, "Math.sin");
        expression = expression.replace(/cos/g, "Math.cos");

        // eval() bertugas mengeksekusi string teks menjadi hitungan matematika asli
        display.value = eval(expression);
      } catch (err) {
        display.value = 'Error';
      }
    }
  </script>

</body>

</html>
