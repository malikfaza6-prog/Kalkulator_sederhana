<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Konversi Suhu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container-fluid p-0">
        <!--NavBar-->
        <nav class="navbar navbar-expand-lg navbar-light bg-info">
            <div class="container-fluid">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav mx-auto justify-content-center w-100">
                        <li class="nav-item">
                            <a class="nav-link text-dark fs-5" href="/">Artimatika</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark fs-5" href="/logika.html">Logika</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark fs-5" href="/mata_uang.html">Mata uang</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active fw-bold text-dark fs-5" aria-current="page"
                                href="/suhu.html">Suhu</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark fs-5" href="/fakbonaci.html">Fibonaci Faktorial</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <!--end navbar-->

        <!--Konversi Suhu-->
        <div class="container p-4">
            <div class="card-shadow p-4" style="height: auto; min-height: 60vh;">
                <p class="text-center fs-5 fw-bold">Konversi Suhu</p>

                <!-- Layar Input -->
                <input type="text" id="display" class="form-control screen mb-3" value="0" readonly>

                <!-- Pilih satuan asal -->
                <p class="text-center fw-bold mb-2" style="color:#1a3c40; font-size:0.85rem;">SATUAN ASAL</p>
                <div class="row g-3 mb-3">
                    <div class="col-3">
                        <button id="btn-C" class="btn btn-light calc-btn rounded-pill w-100 btn-currency active"
                            onclick="setSatuan('C')">°C</button>
                    </div>
                    <div class="col-3">
                        <button id="btn-F" class="btn btn-light calc-btn rounded-pill w-100 btn-currency"
                            onclick="setSatuan('F')">°F</button>
                    </div>
                    <div class="col-3">
                        <button id="btn-K" class="btn btn-light calc-btn rounded-pill w-100 btn-currency"
                            onclick="setSatuan('K')">K</button>
                    </div>
                    <div class="col-3">
                        <button id="btn-R" class="btn btn-light calc-btn rounded-pill w-100 btn-currency"
                            onclick="setSatuan('R')">°R</button>
                    </div>
                </div>

                <!-- Keypad angka -->
                <div class="container-fluid p-0">
                    <div class="row g-3 mb-3">
                        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
                                onclick="appendInput('7')">7</button></div>
                        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
                                onclick="appendInput('8')">8</button></div>
                        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
                                onclick="appendInput('9')">9</button></div>
                        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
                                onclick="toggleNegatif()">+/-</button></div>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
                                onclick="appendInput('4')">4</button></div>
                        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
                                onclick="appendInput('5')">5</button></div>
                        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
                                onclick="appendInput('6')">6</button></div>
                        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
                                onclick="backspace()">⌫</button></div>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
                                onclick="appendInput('1')">1</button></div>
                        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
                                onclick="appendInput('2')">2</button></div>
                        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
                                onclick="appendInput('3')">3</button></div>
                        <div class="col-3"><button class="btn btn-light calc-btn rounded-pill w-100"
                                onclick="appendInput('.')">.</button></div>
                    </div>
                    <div class="row g-3">
                        <div class="col-6"><button class="btn btn-light calc-btn rounded-pill w-100"
                                onclick="clearScreen()">AC</button></div>
                        <div class="col-6"><button class="btn btn-primary calc-btn rounded-pill w-100"
                                onclick="konversiSuhu()">Konversi</button></div>
                    </div>
                </div>

                <!-- Hasil Konversi Suhu -->
                <div id="hasilSuhu" class="hasil-konversi d-none mt-3">
                    <p class="fw-bold mb-2 text-center" style="font-size:0.85rem; color:#1a3c40;">HASIL KONVERSI</p>
                    <div class="row">
                        <div class="col-6 fw-bold">Celsius (°C)</div>
                        <div class="col-6 text-end" id="r-C">-</div>
                    </div>
                    <div class="row">
                        <div class="col-6 fw-bold">Fahrenheit (°F)</div>
                        <div class="col-6 text-end" id="r-F">-</div>
                    </div>
                    <div class="row">
                        <div class="col-6 fw-bold">Kelvin (K)</div>
                        <div class="col-6 text-end" id="r-K">-</div>
                    </div>
                    <div class="row">
                        <div class="col-6 fw-bold">Reamur (°R)</div>
                        <div class="col-6 text-end" id="r-R">-</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        let satuanAsal = 'C';

        function setSatuan(satuan) {
            satuanAsal = satuan;
            document.querySelectorAll('.btn-currency').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + satuan).classList.add('active');
        }

        function appendInput(val) {
            if (display.value === '0') {
                display.value = val === '.' ? '0.' : val;
            } else if (display.value === '-0') {
                display.value = val === '.' ? '-0.' : '-' + val;
            } else {
                if (val === '.' && display.value.includes('.')) return;
                display.value += val;
            }
        }

        function clearScreen() {
            display.value = '0';
            document.getElementById('hasilSuhu').classList.add('d-none');
        }

        function backspace() {
            if (display.value.length > 1) {
                display.value = display.value.slice(0, -1);
            } else {
                display.value = '0';
            }
        }

        function toggleNegatif() {
            if (display.value.startsWith('-')) {
                display.value = display.value.slice(1);
            } else if (display.value !== '0') {
                display.value = '-' + display.value;
            }
        }

        function konversiSuhu() {
            const nilai = parseFloat(display.value);
            if (isNaN(nilai)) { display.value = 'Error'; return; }

            fetch('/api/kalkulator', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mode: 'suhu', dari: satuanAsal, nilai: nilai })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.error) { display.value = 'Error'; return; }
                    document.getElementById('hasilSuhu').classList.remove('d-none');
                    const h = data.hasil;
                    document.getElementById('r-C').textContent = h.C + ' °C';
                    document.getElementById('r-F').textContent = h.F + ' °F';
                    document.getElementById('r-K').textContent = h.K + ' K';
                    document.getElementById('r-R').textContent = h.R + ' °R';
                })
                .catch(() => { display.value = 'Error'; });
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
